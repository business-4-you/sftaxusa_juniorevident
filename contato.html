<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SF TAX USA — Contato</title>
<meta name="description" content="" />
<link rel="icon" href="assets/sf-logo-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/service.css" />
</head>
<body data-page="contact">

<div data-header></div>

<section class="hero">
  <div class="wrap">
    <div style="max-width:760px;padding-block:clamp(44px,6vw,72px)">
      <nav class="breadcrumb svc-breadcrumb reveal in" style="margin-bottom:18px">
        <a href="index.html" data-href-lang style="color:#c5d2ea" data-i18n="svc.breadcrumbHome">Início</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;opacity:.5"><path d="m6 9 6 6 6-6"/></svg>
        <span style="color:#fff" data-i18n="pages.contactPage.eyebrow">Contato</span>
      </nav>
      <span class="eyebrow" style="color:var(--blue)"><span data-i18n="pages.contactPage.eyebrow">Contato</span></span>
      <h1 class="h-display" data-i18n="pages.contactPage.h1">Fale com um especialista da SF TAX USA</h1>
      <p class="lead" style="margin-top:18px" data-i18n="pages.contactPage.sub"></p>
    </div>
  </div>
</section>

<section class="section">
  <div class="wrap contact-grid">
    <div class="reveal">
      <div class="contact-line">
        <span class="ci"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.004c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.02zM12.04 20.15h-.004a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.24-8.23a8.2 8.2 0 0 1 5.82 2.41 8.18 8.18 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.24 8.23z"/></svg></span>
        <div><b data-i18n="contact.waTitle">WhatsApp</b><br /><a data-wa data-loc="contact_page_info" data-cfg-wa></a><br /><span class="muted" style="font-size:13.5px" data-i18n="contact.waText"></span></div>
      </div>
      <div class="contact-line">
        <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.7.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg></span>
        <div><b data-i18n="contact.phoneTitle">Telefone</b><br /><a data-tel data-cfg-phone></a></div>
      </div>
      <div class="contact-line">
        <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></span>
        <div><b data-i18n="contact.emailTitle">E-mail</b><br /><a data-mail data-cfg-mail></a></div>
      </div>
      <div class="contact-line">
        <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></span>
        <div><b data-i18n="contact.addrTitle">Escritório</b><br /><span class="muted" data-i18n="contact.addrText">Flórida, Estados Unidos</span></div>
      </div>
      <div class="contact-line">
        <span class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
        <div><b data-i18n="contact.hoursTitle">Atendimento</b><br /><span class="muted" data-i18n="contact.hoursText">Seg–Sex, 9h às 18h (EST)</span></div>
      </div>
      <a class="btn btn--green btn--lg" data-wa data-loc="contact_page_cta" style="margin-top:10px"><svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.004c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.02z"/></svg><span data-i18n="cta.talkNow">Falar agora</span></a>
    </div>

    <div class="reveal">
      <form class="form-card" data-contact-form>
        <h3 class="h-2" style="margin-bottom:22px" data-i18n="contact.formTitle">Solicite uma análise</h3>
        <div class="field-row">
          <div class="field"><label data-i18n="contact.f_name">Nome completo</label><input type="text" name="name" required /></div>
          <div class="field"><label data-i18n="contact.f_phone">Telefone / WhatsApp</label><input type="tel" name="phone" required /></div>
        </div>
        <div class="field"><label data-i18n="contact.f_email">E-mail</label><input type="email" name="email" required /></div>
        <div class="field-row">
          <div class="field"><label data-i18n="contact.f_lang">Idioma preferencial</label>
            <select name="lang"><option>Português</option><option>English</option><option>Español</option></select>
          </div>
          <div class="field"><label data-i18n="contact.f_service">Tipo de serviço</label>
            <select name="service" data-service-options><option value="" data-i18n="contact.f_servicePlaceholder">Selecione um serviço</option></select>
          </div>
        </div>
        <div class="field"><label data-i18n="contact.f_msg">Como podemos ajudar?</label><textarea name="message" data-i18n-attr="placeholder:contact.f_msgPlaceholder"></textarea></div>
        <button class="btn btn--green btn--block btn--lg" type="submit" data-i18n="contact.submit">Solicitar análise</button>
        <p class="form-note" data-i18n="contact.privacy"></p>
        <p class="form-note" data-form-success hidden style="color:var(--green-600);font-weight:700;font-size:15px" data-i18n="contact.success"></p>
      </form>
    </div>
  </div>
</section>

<footer class="site-footer" data-footer></footer>

<div class="sticky-cta">
  <a class="btn btn--green" data-wa data-loc="sticky"><svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.004c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.02z"/></svg><span data-i18n="cta.whatsapp">WhatsApp</span></a>
  <a class="btn btn--navy" href="servicos.html" data-href-lang><span data-i18n="cta.seeServices">Ver serviços</span></a>
</div>
<a class="wa-float" data-wa data-loc="float" aria-label="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" style="width:30px;height:30px"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.004c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.02zM12.04 20.15h-.004a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.24-8.23a8.2 8.2 0 0 1 5.82 2.41 8.18 8.18 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.24 8.23z"/></svg></a>

<script src="js/core.js"></script>

<script src="js/i18n.en.js"></script>
<script src="js/i18n.es.js"></script>

<script src="js/services.en.js"></script>
<script src="js/services.es.js"></script>

<script src="js/footer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
